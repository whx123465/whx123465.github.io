<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ESP32 公共时钟</title>
    <style>
        body{text-align:center;margin-top:100px;font-size:24px}
        #time{font-size:52px;color:blue;font-weight:bold}
        #status{font-size:30px;font-weight:bold}
        .online{color:green}
        .offline{color:red}
    </style>
</head>
<body>
    <h2>ESP32 网络时钟</h2>
    <div id="time">--:--:--</div>
    <div id="status">加载中...</div>

    <script>
        // 改成你 ESP32 的局域网 IP
        const ESP_IP = "192.168.1.110";

        function update(){
            fetch("http://"+ESP_IP+"/time")
            .then(r=>r.text())
            .then(t=>{
                document.getElementById("time").innerText = t;
                document.getElementById("status").innerText = "✅ 设备在线";
                document.getElementById("status").className = "online";
            })
            .catch(()=>{
                document.getElementById("time").innerText = "未连接";
                document.getElementById("status").innerText = "❌ 设备离线";
                document.getElementById("status").className = "offline";
            });
        }

        setInterval(update, 1000);
    </script>
</body>
</html>
